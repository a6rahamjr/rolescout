name: Bug report
description: Report reproducible behavior that is not working as expected
title: "[Bug]: "
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened, and what did you expect instead?
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction steps
      description: Include a minimal request, command, or input file when possible.
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: RoleScout version
      placeholder: "1.1.0"
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Python version, operating system, and relevant logs.
