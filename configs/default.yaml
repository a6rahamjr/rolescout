project:
  name: RoleScout
  random_seed: 42

data:
  synthetic_output: data/processed/job_matches.csv
  n_queries: 300
  candidates_per_query: 8

training:
  test_size: 0.20
  cv_folds: 4
  c_values: [0.1, 0.5, 1.0, 2.0, 5.0]
  class_weights: [null, balanced]

model:
  artifact_path: artifacts/job_ranker.joblib
  metrics_path: artifacts/metrics.json
  max_word_features: 8000
  max_char_features: 10000
  recency_half_life_days: 14

provider:
  remotive_url: https://remotive.com/api/remote-jobs
  timeout_seconds: 15
  cache_ttl_seconds: 21600
  user_agent: RoleScout/1.0

storage:
  database_path: rolescout.db

api:
  host: 0.0.0.0
  port: 8000
  default_result_limit: 20
  max_result_limit: 100
